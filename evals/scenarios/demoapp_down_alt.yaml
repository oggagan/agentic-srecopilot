id: demoapp_down_alt
description: same outage, different alert wording (robustness)
trigger: "the demoapp api stopped responding, looks like the process is not running"
inject:
  - "sudo systemctl stop demoapp"
reset:
  - "sudo systemctl start demoapp"
ground_truth:
  incident_type: service_down
  target_service: demoapp
  should_recover: true
negative_control: false
